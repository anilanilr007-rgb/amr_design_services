<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Application Submitted</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f6f4fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.container{
    max-width:650px;
    width:100%;
    background:white;
    padding:50px 40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.success-icon{
    font-size:70px;
    margin-bottom:20px;
}

h1{
    color:#5a2d82;
    margin-bottom:15px;
}

p{
    color:#666;
    line-height:1.8;
    font-size:17px;
    margin-bottom:15px;
}

button{
    margin-top:20px;
    background:#5a2d82;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

button:hover{
    background:#6c35a0;
    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="container">

    <div class="success-icon">✅</div>

    <h1>Application Submitted Successfully</h1>

    <p>
        Thank you for contacting us.
    </p>

    <p>
        Your inquiry has been submitted successfully.
        Our team will review your requirements and
        get back to you shortly.
    </p>

    <p>
        Please reach out again for more inquiries or future projects.
    </p>

    <button onclick="window.location.href='index.html'">
        Back to Home
    </button>

</div>

</body>
</html>
