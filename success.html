<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Service Inquiry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f6f4fb;
    padding:40px;
}

/* MAIN FORM */

.container{
    max-width:750px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    color:#5a2d82;
    margin-bottom:20px;
    text-align:center;
}

.service-name{
    font-size:24px;
    font-weight:600;
    margin-bottom:25px;
    color:#333;
    text-align:center;
}

.details{
    margin-bottom:30px;
    color:#666;
    line-height:1.7;
    text-align:center;
}

form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#5a2d82;
    box-shadow:0 0 8px rgba(90,45,130,0.2);
}

textarea{
    height:150px;
    resize:none;
}

/* FILE UPLOAD */

.file-upload{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.file-upload label{
    font-weight:500;
    color:#555;
}

/* BUTTON */

button{
    background:#5a2d82;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

button:hover{
    background:#6c35a0;
    transform:translateY(-2px);
}

/* SUCCESS POPUP */

.success-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.popup-box{
    background:white;
    width:100%;
    max-width:520px;
    padding:45px 35px;
    border-radius:20px;
    text-align:center;
    animation:popupShow 0.4s ease;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.success-icon{
    font-size:70px;
    margin-bottom:20px;
}

.popup-box h2{
    color:#5a2d82;
    margin-bottom:15px;
}

.popup-box p{
    color:#666;
    line-height:1.8;
    margin-bottom:30px;
    font-size:16px;
}

/* EXPLORE BUTTON */

.explore-btn{
    width:100%;
    background:#5a2d82;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.explore-btn:hover{
    background:#6c35a0;
    transform:translateY(-2px);
}

/* POPUP ANIMATION */

@keyframes popupShow{

    from{
        transform:scale(0.8);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }

}

/* RESPONSIVE */

@media(max-width:768px){

    body{
        padding:20px;
    }

    .container{
        padding:25px;
    }

}

</style>

</head>

<body>

<!-- MAIN FORM -->

<div class="container" id="mainContainer">

    <h1>Service Inquiry Form</h1>

    <div class="service-name" id="serviceTitle"></div>

    <div class="details">
        Please send your project details,
        technical requirements, and attachments.
    </div>

    <form 
        id="inquiryForm"
        enctype="multipart/form-data"
    >

        <!-- WEB3FORMS ACCESS KEY -->

        <input 
            type="hidden" 
            name="access_key" 
            value="86dfbb6e-3823-40eb-876c-b65dba810a64"
        >

        <!-- NAME -->

        <input 
            type="text" 
            name="name"
            placeholder="Your Name" 
            required
        >

        <!-- EMAIL -->

        <input 
            type="email" 
            name="email"
            placeholder="Your Email Address" 
            required
        >

        <!-- MOBILE -->

        <input 
            type="tel" 
            name="mobile"
            placeholder="Mobile Number" 
            required
        >

        <!-- COMPANY -->

        <input 
            type="text" 
            name="company"
            placeholder="Company Name"
        >

        <!-- SERVICE -->

        <input 
            type="text" 
            name="service"
            id="serviceInput" 
            readonly
        >

        <!-- PROJECT TYPE -->

        <select name="project_type" required>

            <option value="">
                Select Project Type
            </option>

            <option>3D CAD Design</option>

            <option>2D CAD Drafting</option>

            <option>Sheet Metal Design</option>

            <option>CAD Conversion</option>

            <option>Reverse Engineering</option>

            <option>Conceptual Design</option>

        </select>

        <!-- REQUIREMENT -->

        <textarea 
            name="requirement"
            placeholder="Enter Project Requirement / Inquiry">
        </textarea>

        <!-- FILE ATTACHMENT -->

        <div class="file-upload">

            <label for="attachment">
                Attach CAD File
            </label>

            <input 
                type="file"
                id="attachment"
                name="attachment"
                accept=".pdf,.dwg,.dxf,.step,.stp,.iges,.igs,.zip,.rar,.jpg,.png"
            >

        </div>

        <!-- SUBMIT BUTTON -->

        <button type="submit">
            Send Inquiry
        </button>

    </form>

</div>

<!-- SUCCESS POPUP -->

<div class="success-popup" id="successPopup">

    <div class="popup-box">

        <div class="success-icon">✅</div>

        <h2>Inquiry Submitted Successfully</h2>

        <p>
            Thank you for contacting AMR Designs Services.
            Our team will review your inquiry and
            get back to you soon.
        </p>

        <button 
            class="explore-btn"
            onclick="window.location.href='index.html'"
        >
            Continue to Explore AMR Designs Services
        </button>

    </div>

</div>

<script>

/* GET SERVICE NAME FROM URL */

const params = new URLSearchParams(window.location.search);

const service = params.get("service");

/* DISPLAY SERVICE NAME */

document.getElementById(
    "serviceTitle"
).innerText = service || "Service Inquiry";

document.getElementById(
    "serviceInput"
).value = service || "General Inquiry";

/* FORM SUBMIT */

const form = document.getElementById("inquiryForm");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData(form);

    try{

        const response = await fetch(
            "https://api.web3forms.com/submit",
            {
                method:"POST",
                body:formData
            }
        );

        const result = await response.json();

        if(result.success){

            /* CLOSE INQUIRY PAGE */

            document.getElementById(
                "mainContainer"
            ).style.display = "none";

            /* SHOW SUCCESS POPUP */

            document.getElementById(
                "successPopup"
            ).style.display = "flex";

        }
        else{

            alert(
                "Submission failed. Please try again."
            );

        }

    }
    catch(error){

        alert(
            "Something went wrong. Please try again."
        );

    }

});

</script>

</body>
</html>
